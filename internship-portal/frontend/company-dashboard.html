<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Dashboard | InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background: #f8faff;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: #4f46e5;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 700;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #4f46e5;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .internship-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            margin-bottom: 20px;
        }

        .app-row {
            border: 1px solid #f3f4f6;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .app-row:hover {
            background: #f8faff;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .status-applied {
            background: #eef2ff;
            color: #4f46e5;
        }

        .status-shortlisted {
            background: #fffbeb;
            color: #d97706;
        }

        .status-selected {
            background: #f0fdf4;
            color: #059669;
        }

        .status-rejected {
            background: #fef2f2;
            color: #dc2626;
        }

        .action-btn {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .btn-shortlist {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fcd34d;
        }

        .btn-select {
            background: #f0fdf4;
            color: #059669;
            border: 1px solid #6ee7b7;
        }

        .btn-reject {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎯 InternHub</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0" id="companyName">Company Dashboard</h4>
                <p class="text-muted mb-0">Manage your internships and applications</p>
            </div>
            <a href="post-internship.html" class="btn btn-primary">
                + Post New Internship
            </a>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalInternships">0</div>
                    <div class="stat-label">Internships Posted</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalApplications">0</div>
                    <div class="stat-label">Total Applications</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="shortlistedCount" style="color:#d97706">0</div>
                    <div class="stat-label">Shortlisted</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="selectedCount" style="color:#059669">0</div>
                    <div class="stat-label">Selected</div>
                </div>
            </div>
        </div>

        <!-- Applications by Internship -->
        <h5 class="fw-bold mb-3">📋 Applications Received</h5>
        <div id="applicationsList">
            <div class="text-center py-5 text-muted">⏳ Loading...</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        requireAuth();
        const user = getUser();

        if (!user || user.role !== 'company') {
            window.location.href = 'index.html';
        }

        document.getElementById('companyName').textContent =
            `Welcome, ${user.name}! 🏢`;

        async function loadDashboard() {
            // Get all internships posted by this company
            const internships = await internshipAPI.search({});
            const myInternships = internships.filter(i =>
                i.company?._id === user.id || i.company === user.id
            );

            document.getElementById('totalInternships').textContent =
                myInternships.length;
            document.getElementById('applicationsList').innerHTML = '';    

            if (myInternships.length === 0) {
                document.getElementById('applicationsList').innerHTML = `
          <div class="text-center py-5 text-muted">
            <div style="font-size:3rem">📭</div>
            <h5 class="mt-3">No internships posted yet</h5>
            <a href="post-internship.html" class="btn btn-primary mt-2">
              Post Your First Internship
            </a>
          </div>`;
                return;
            }

            // Get applications for each internship
            let allApps = [];
            for (const internship of myInternships) {
                try {
                 const apps = await getApplicationsByInternship(internship._id);
                 const appsArray = Array.isArray(apps) ? apps : [];
                 allApps = allApps.concat(appsArray);
                 renderInternshipSection(internship, appsArray);
                }catch (err) {
                 renderInternshipSection(internship, []);
                }
            }

            // Update stats
            document.getElementById('totalApplications').textContent = allApps.length;
            document.getElementById('shortlistedCount').textContent =
                allApps.filter(a => a.status === 'shortlisted').length;
            document.getElementById('selectedCount').textContent =
                allApps.filter(a => a.status === 'selected').length;
        }

        async function getApplicationsByInternship(internshipId) {
            const res = await fetch(
                `http://localhost:5000/api/applications/internship/${internshipId}`,
                { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } }
            );
            return res.json();
        }

        function renderInternshipSection(internship, apps) {
            const list = document.getElementById('applicationsList');

            const section = document.createElement('div');
            section.className = 'internship-section';
            section.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
    <h6 class="fw-bold mb-0">${internship.title}</h6>
    <small class="text-muted">📍 ${internship.location} &nbsp;|&nbsp;
      ₹${internship.stipend?.toLocaleString()}/month</small>
  </div>
  <div class="d-flex gap-2 align-items-center">
    <span class="badge bg-primary">${apps.length} applications</span>
    
    <button class="btn btn-outline-primary btn-sm"
      onclick="editInternship('${internship._id}')">
      ✏️ Edit
    </button>
    <button class="btn btn-outline-danger btn-sm"
      onclick="deleteInternship('${internship._id}', this)">
      🗑️ Delete
    </button>
    
     </div>
  </div>

        ${apps.length === 0 ? `
          <p class="text-muted small">No applications yet for this internship.</p>
        ` : apps.map(app => `
          <div class="app-row" id="app-${app._id}">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="fw-semibold">
                  👤 ${app.student?.name || 'Student'}
                </div>
                <div class="text-muted small">
                  ${app.student?.email || ''}
                </div>
                ${app.coverLetter ? `
                  <div class="text-muted small mt-1">
                    💬 "${app.coverLetter.substring(0, 80)}..."
                  </div>` : ''}
                <div class="text-muted small mt-1">
                  🕐 Applied ${new Date(app.createdAt).toLocaleDateString()}
                </div>
              </div>
              <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="status-badge status-${app.status}"
                  id="status-${app._id}">
                  ${capitalize(app.status)}
                </span>
                <button class="action-btn btn-shortlist"
                  onclick="updateStatus('${app._id}', 'shortlisted')">
                  ⭐ Shortlist
                </button>
                <button class="action-btn btn-select"
                  onclick="updateStatus('${app._id}', 'selected')">
                  🎉 Select
                </button>
                <button class="action-btn btn-reject"
                  onclick="updateStatus('${app._id}', 'rejected')">
                  ❌ Reject
                </button>
              </div>
            </div>
          </div>
        `).join('')}
      `;
            list.appendChild(section);
        }

        async function updateStatus(appId, status) {
            const res = await fetch(
                `http://localhost:5000/api/applications/${appId}/status`,
                {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ status })
                }
            );
            const data = await res.json();

            if (data.application) {
                // Update badge in UI instantly
                const badge = document.getElementById(`status-${appId}`);
                badge.className = `status-badge status-${status}`;
                badge.textContent = capitalize(status);

                // Show quick feedback
                alert(`✅ Status updated to ${capitalize(status)}!`);
            }
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
        
        async function deleteInternship(id, btn) {
           if (!confirm('Are you sure you want to delete this internship?')) return;

           const result = await internshipAPI.delete(id);
           if (result.message === 'Internship deleted successfully') {
             // Remove the section from UI
             btn.closest('.internship-section').remove();
             alert('✅ Internship deleted!');
           } else {
             alert('❌ Failed to delete: ' + result.message);
           }
        }

        function editInternship(id) {
          window.location.href = `edit-internship.html?id=${id}`;
        }
        loadDashboard();
    </script>
</body>

</html>
