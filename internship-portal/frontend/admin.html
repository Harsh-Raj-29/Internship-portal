<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8faff; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1f2937; }
    .navbar-brand { color: white !important; font-weight: 700; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      text-align: center;
    }
    .stat-number { font-size: 2rem; font-weight: 800; color: #4f46e5; }
    .stat-label { color: #6b7280; font-size: 0.9rem; }
    .section-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    .company-row {
      border: 1px solid #f3f4f6;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .report-row {
      border: 1px solid #fee2e2;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      background: #fff5f5;
    }
    .verified-badge {
      background: #f0fdf4;
      color: #059669;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .unverified-badge {
      background: #fffbeb;
      color: #d97706;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">⚙️ Admin Panel</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm" onclick="logout()">
              Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">

    <h4 class="fw-bold mb-4">👨‍💼 Admin Dashboard</h4>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-3 col-6">
        <div class="stat-card">
          <div class="stat-number" id="totalCompanies">0</div>
          <div class="stat-label">Total Companies</div>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="stat-card">
          <div class="stat-number" style="color:#059669"
            id="verifiedCompanies">0</div>
          <div class="stat-label">Verified</div>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="stat-card">
          <div class="stat-number" style="color:#d97706"
            id="unverifiedCompanies">0</div>
          <div class="stat-label">Unverified</div>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="stat-card">
          <div class="stat-number" style="color:#dc2626"
            id="reportedInternships">0</div>
          <div class="stat-label">Reported Internships</div>
        </div>
      </div>
    </div>

    <!-- Companies Section -->
    <div class="section-card">
      <h5 class="fw-bold mb-3">🏢 Company Verification</h5>
      <div id="companiesList">
        <div class="text-center py-3 text-muted">⏳ Loading...</div>
      </div>
    </div>

    <!-- Reported Internships Section -->
    <div class="section-card">
      <h5 class="fw-bold mb-3">🚩 Reported Internships</h5>
      <div id="reportsList">
        <div class="text-center py-3 text-muted">⏳ Loading...</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();

    if (!user || user.role !== 'admin') {
      alert('Admin access only!');
      window.location.href = 'index.html';
    }

    async function loadDashboard() {
      await loadCompanies();
      await loadReports();
    }

    async function loadCompanies() {
      const companies = await adminAPI.getCompanies();
      const list = document.getElementById('companiesList');

      if (!companies || companies.length === 0) {
        list.innerHTML = '<p class="text-muted">No companies registered yet.</p>';
        return;
      }

      const verified = companies.filter(c => c.isVerified).length;
      document.getElementById('totalCompanies').textContent = companies.length;
      document.getElementById('verifiedCompanies').textContent = verified;
      document.getElementById('unverifiedCompanies').textContent =
        companies.length - verified;

      list.innerHTML = companies.map(company => `
        <div class="company-row" id="company-${company._id}">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
              <div class="fw-semibold">🏢 ${company.name}</div>
              <div class="text-muted small">${company.email}</div>
              <div class="text-muted small">
                Registered: ${new Date(company.createdAt).toLocaleDateString()}
              </div>
            </div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="${company.isVerified
                ? 'verified-badge' : 'unverified-badge'}"
                id="badge-${company._id}">
                ${company.isVerified ? '✅ Verified' : '⚠️ Unverified'}
              </span>
              ${!company.isVerified ? `
                <button class="btn btn-success btn-sm"
                  id="btn-${company._id}"
                  onclick="verifyCompany('${company._id}')">
                  ✅ Verify
                </button>
              ` : `
                <button class="btn btn-outline-danger btn-sm"
                  id="btn-${company._id}"
                  onclick="unverifyCompany('${company._id}')">
                  Remove Verification
                </button>
              `}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function loadReports() {
      const reports = await adminAPI.getReports();
      const list = document.getElementById('reportsList');

      document.getElementById('reportedInternships').textContent =
        reports?.length || 0;

      if (!reports || reports.length === 0) {
        list.innerHTML = '<p class="text-muted">✅ No reported internships!</p>';
        return;
      }

      list.innerHTML = reports.map(internship => `
        <div class="report-row" id="report-${internship._id}">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
            <div>
              <div class="fw-semibold">📢 ${internship.title}</div>
              <div class="text-muted small">
                🏢 ${internship.company?.name} |
                📍 ${internship.location}
              </div>
            <div class="text-danger small mt-1 fw-bold">
              ${internship.reportCount >= 4
              ? '🚨 HIGH RISK — Multiple reports, likely fake!'
              : internship.reportCount >= 2
              ? '⚠️ MODERATE RISK — Review carefully'
              : '📋 LOW RISK — Single report, verify before action'
              }
              (${internship.reportCount} report(s))
            </div>
              <div class="mt-2">
                ${internship.reports?.map(r => `
                  <div class="small text-muted">
                    • "${r.reason}" —
                    ${new Date(r.reportedAt).toLocaleDateString()}
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm"
                onclick="dismissReport('${internship._id}')">
                Dismiss
              </button>
              <button class="btn btn-danger btn-sm"
                onclick="removeInternship('${internship._id}')">
                🗑️ Remove
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function verifyCompany(id) {
      const btn = document.getElementById(`btn-${id}`);
      if (btn) btn.disabled = true;
      const result = await adminAPI.verifyCompany(id);
      if (result.company) await loadCompanies();
      else if (btn) btn.disabled = false;
    }

    async function unverifyCompany(id) {
      const btn = document.getElementById(`btn-${id}`);
      if (btn) btn.disabled = true;
      const result = await adminAPI.unverifyCompany(id);
      if (result.company) await loadCompanies();
      else if (btn) btn.disabled = false;
    }

    async function removeInternship(id) {
      if (!confirm('Remove this internship permanently?')) return;
      const result = await adminAPI.deleteInternship(id);
      if (result.message === 'Internship removed by admin') {
        document.getElementById(`report-${id}`).remove();
        document.getElementById('reportedInternships').textContent =
          parseInt(document.getElementById('reportedInternships')
            .textContent) - 1;
      } else {
        alert('❌ Failed: ' + result.message);
      }
    }

    async function dismissReport(id) {
      if (!confirm('Dismiss all reports for this internship?')) return;
      const result = await adminAPI.dismissReport(id);
      if (result.message === 'Reports dismissed successfully') {
        document.getElementById(`report-${id}`).remove();
        document.getElementById('reportedInternships').textContent =
          parseInt(document.getElementById('reportedInternships')
            .textContent) - 1;
      } else {
        alert('❌ Failed: ' + result.message);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
