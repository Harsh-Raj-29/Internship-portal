<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Internship Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4ff; }
    .card { border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .btn-primary { background: #4f46e5; border: none; }
    .btn-primary:hover { background: #4338ca; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card p-4" style="width: 100%; max-width: 420px;">
    <h3 class="text-center mb-1 fw-bold text-primary">Welcome Back 👋</h3>
    <p class="text-center text-muted mb-4">Login to your account</p>

    <div id="errorMsg" class="alert alert-danger d-none"></div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••"/>
    </div>

    <button class="btn btn-primary w-100 py-2 mb-3" onclick="handleLogin()">
      Login
    </button>

    <p class="text-center text-muted">
      Don't have an account? 
      <a href="register.html" class="text-primary fw-bold">Register</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = 'Please fill in all fields';
        return;
      }

      const data = await authAPI.login({ email, password });

      if (data.token) {
        saveAuth(data);
        if (data.user.role === 'company') {
          window.location.href = 'index.html';
        } else {
          window.location.href = 'index.html';
        }
      } else {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = data.message || 'Login failed';
      }
    }
  </script>
</body>
</html>
