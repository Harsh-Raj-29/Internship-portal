<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8faff; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #4f46e5; }
    .navbar-brand { color: white !important; font-weight: 700; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .profile-card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .skill-tag {
      background: #eef2ff;
      color: #4f46e5;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      margin: 3px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .skill-tag .remove {
      cursor: pointer;
      font-weight: 700;
      color: #818cf8;
    }
    .skill-tag .remove:hover { color: #dc2626; }
    .btn-save {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn-save:hover { background: #4338ca; color: white; }
    .avatar {
      width: 80px;
      height: 80px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎯 InternHub</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="listings.html">Browse</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 700px;">

    <!-- Profile Header -->
    <div class="profile-card mb-4">
      <div class="d-flex align-items-center gap-3 mb-3">
        <div class="avatar" id="avatarText">?</div>
        <div>
          <h4 class="fw-bold mb-0" id="userName">Loading...</h4>
          <span class="text-muted" id="userEmail"></span>
        </div>
      </div>
      <div id="profileStatus" class="alert alert-warning mb-0">
        ⚠️ Complete your profile to get skill gap analysis!
      </div>
    </div>

    <!-- Profile Form -->
    <div class="profile-card">
      <h5 class="fw-bold mb-4">📝 Edit Profile</h5>

      <div id="successMsg" class="alert alert-success d-none"></div>
      <div id="errorMsg" class="alert alert-danger d-none"></div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">CGPA</label>
          <input type="number" id="cgpa" class="form-control"
            placeholder="e.g. 8.5" min="0" max="10" step="0.1"/>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Graduation Year</label>
          <select id="graduationYear" class="form-control">
            <option value="">Select Year</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Branch</label>
          <input type="text" id="branch" class="form-control"
            placeholder="e.g. Computer Science"/>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">College</label>
          <input type="text" id="college" class="form-control"
            placeholder="e.g. MIT Pune"/>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Bio</label>
          <textarea id="bio" class="form-control" rows="3"
            placeholder="Tell companies about yourself..."></textarea>
        </div>

        <!-- Skills Input -->
        <div class="col-12">
          <label class="form-label fw-semibold">Skills</label>
          <div class="d-flex gap-2 mb-2">
            <input type="text" id="skillInput" class="form-control"
              placeholder="Type a skill and press Enter or Add"/>
            <button class="btn btn-outline-primary" onclick="addSkill()">Add</button>
          </div>
          <div id="skillTags"></div>
          <small class="text-muted">e.g. HTML, CSS, JavaScript, React, Node.js</small>
        </div>

      </div>

      <div class="mt-4">

        <!-- Resume Upload -->
       <div class="col-12">
         <label class="form-label fw-semibold">Resume (PDF only, max 5MB)</label>
         <div class="d-flex gap-2 align-items-center">
           <input type="file" id="resumeFile" class="form-control"
             accept=".pdf"/>
           <button class="btn btn-outline-primary" onclick="uploadResume()">
             📄 Upload
           </button>
         </div>
         <div id="resumeStatus" class="mt-2"></div>
         <div id="currentResume" class="mt-2"></div>
       </div>

        <button class="btn-save" onclick="saveProfile()">
          💾 Save Profile
        </button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();

    const user = getUser();
    let skills = [];

    // Set user info in header
    if (user) {
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('avatarText').textContent =
        user.name.charAt(0).toUpperCase();
    }

    // Load existing profile
  async function loadProfile() { 
  const profile = await profileAPI.getMe();

  if (profile && !profile.message) {
    document.getElementById('cgpa').value = profile.cgpa || '';
    document.getElementById('graduationYear').value =
      profile.graduationYear || '';
    document.getElementById('branch').value = profile.branch || '';
    document.getElementById('college').value = profile.college || '';
    document.getElementById('bio').value = profile.bio || '';

    skills = profile.skills || [];
    renderSkills();

    // ✅ Show existing resume
  if (profile.resumeUrl) {
  document.getElementById('currentResume').innerHTML = `
    <div class="alert alert-info small d-flex justify-content-between align-items-center">
      <span>
        📄 Current Resume:
        <a href="${profile.resumeUrl}" target="_blank" class="ms-2 fw-bold">
          View Resume
        </a>
      </span>
      <button class="btn btn-outline-danger btn-sm"
        onclick="deleteResume()">
        🗑️ Delete
      </button>
    </div>`;
}

    document.getElementById('profileStatus').className =
      'alert alert-success mb-0';
    document.getElementById('profileStatus').textContent =
      '✅ Profile complete! You can see skill gap on internship pages.';
  }
}

    // Render skill tags
    function renderSkills() {
      const container = document.getElementById('skillTags');
      container.innerHTML = skills.map((s, i) => `
        <span class="skill-tag">
          ${s}
          <span class="remove" onclick="removeSkill(${i})">×</span>
        </span>
      `).join('');
    }

    // Add skill on Enter key
    document.getElementById('skillInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addSkill();
    });

    function addSkill() {
      const input = document.getElementById('skillInput');
      const skill = input.value.trim();
      if (skill && !skills.includes(skill)) {
        skills.push(skill);
        renderSkills();
      }
      input.value = '';
    }

    function removeSkill(index) {
      skills.splice(index, 1);
      renderSkills();
    }

    async function saveProfile() {
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      successMsg.classList.add('d-none');
      errorMsg.classList.add('d-none');

      const data = {
        cgpa: parseFloat(document.getElementById('cgpa').value),
        graduationYear: parseInt(document.getElementById('graduationYear').value),
        branch: document.getElementById('branch').value,
        college: document.getElementById('college').value,
        bio: document.getElementById('bio').value,
        skills
      };

      const result = await profileAPI.save(data);

      if (result.profile) {
        successMsg.classList.remove('d-none');
        successMsg.textContent = '✅ Profile saved successfully!';
        document.getElementById('profileStatus').className =
          'alert alert-success mb-0';
        document.getElementById('profileStatus').textContent =
          '✅ Profile complete!';
      } else {
        errorMsg.classList.remove('d-none');
        errorMsg.textContent = result.message || 'Failed to save profile';
      }
    }

  async function uploadResume() {
  const fileInput = document.getElementById('resumeFile');
  const resumeStatus = document.getElementById('resumeStatus');

  if (!fileInput.files[0]) {
    resumeStatus.innerHTML = '<div class="alert alert-warning small">Please select a PDF file first!</div>';
    return;
  }

  const formData = new FormData();
  formData.append('resume', fileInput.files[0]);

  resumeStatus.innerHTML = '<div class="alert alert-info small">⏳ Uploading...</div>';

  const res = await fetch('/api/upload', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${localStorage.getItem('token')}`
    },
    body: formData
  });

  const data = await res.json();

  if (data.resumeUrl) {
    resumeStatus.innerHTML = `
      <div class="alert alert-success small">
        ✅ Resume uploaded successfully!
        <a href="${data.resumeUrl}" target="_blank" class="ms-2">
          View Resume
        </a>
      </div>`;
  } else {
    resumeStatus.innerHTML = `
      <div class="alert alert-danger small">
        ❌ ${data.message}
      </div>`;
  }
}

async function deleteResume() {
  if (!confirm('Are you sure you want to delete your resume?')) return;

  const resumeStatus = document.getElementById('resumeStatus');
  resumeStatus.innerHTML = '<div class="alert alert-info small">⏳ Deleting...</div>';

  const res = await fetch('/api/upload', {
    method: 'DELETE',
    headers: {
      'Authorization': `Bearer ${localStorage.getItem('token')}`
    }
  });

  const data = await res.json();

  if (data.message === 'Resume deleted successfully') {
    document.getElementById('currentResume').innerHTML = '';
    document.getElementById('resumeFile').value = '';
    resumeStatus.innerHTML = `
      <div class="alert alert-success small">
        ✅ Resume deleted successfully!
      </div>`;
    setTimeout(() => {
      resumeStatus.innerHTML = '';
    }, 3000);
  } else {
    resumeStatus.innerHTML = `
      <div class="alert alert-danger small">
        ❌ ${data.message}
      </div>`;
  }
}

    loadProfile();
  </script>
</body>
</html>
